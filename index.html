<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ローソク足">
<meta name="theme-color" content="#111620">
<meta name="description" content="ローソク足パターンの出現回数を手動でカウント・記録・ランキング化するトレーダー向けツール">
<title>ローソク足パターン カウンター</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e13;
  --bg2:#111620;
  --bg3:#1a2030;
  --bg4:#222a3a;
  --border:#2a3348;
  --border2:#3a4a60;
  --text:#e2eaf8;
  --text2:#8899bb;
  --text3:#556080;
  --up:#ff4d6d;
  --up-dim:rgba(255,77,109,.15);
  --up-border:rgba(255,77,109,.4);
  --down:#22d3ee;
  --down-dim:rgba(34,211,238,.12);
  --down-border:rgba(34,211,238,.35);
  --neu:#a78bfa;
  --neu-dim:rgba(167,139,250,.12);
  --neu-border:rgba(167,139,250,.3);
  --accent:#3b82f6;
  --accent-dim:rgba(59,130,246,.15);
  --gold:#f59e0b;
  --green:#10b981;
  --save-green:#059669;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif}
body{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.app-header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  padding-top:env(safe-area-inset-top);
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  position:sticky;top:0;z-index:100;
}
.app-title{
  display:flex;align-items:center;gap:10px;
  font-size:16px;font-weight:700;letter-spacing:.06em;color:var(--text);
}
.app-title .dot{width:8px;height:8px;border-radius:50%;background:var(--up);box-shadow:0 0 8px var(--up);}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-save,.btn-load,.btn-reset{
  padding:6px 14px;border-radius:6px;border:1px solid var(--border2);
  font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;transition:.15s;
  display:flex;align-items:center;gap:5px;font-weight:500;
}
.btn-save{background:var(--save-green);color:#fff;border-color:var(--save-green);}
.btn-save:hover{background:#047857;border-color:#047857;}
.btn-load{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
.btn-load:hover{background:rgba(59,130,246,.25);}
.btn-reset{background:transparent;color:var(--text2);border-color:var(--border2);}
.btn-reset:hover{color:#ff4d6d;border-color:#ff4d6d;}
.btn-save:active,.btn-load:active,.btn-reset:active{transform:scale(.96)}

/* STATS */
.stats-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding:16px 24px;background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.stat{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;display:flex;flex-direction:column;gap:2px;
}
.stat-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.stat-lbl{font-size:11px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;}
.stat-total .stat-val{color:var(--text)}
.stat-bull .stat-val{color:var(--up)}
.stat-bear .stat-val{color:var(--down)}
.stat-neu .stat-val{color:var(--neu)}

/* MAIN LAYOUT */
.main-layout{display:flex;flex:1;overflow:hidden}
.sidebar{
  width:180px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  padding:16px 10px;display:flex;flex-direction:column;gap:4px;
  overflow-y:auto;
}
.side-tab{
  padding:10px 12px;border-radius:6px;border:none;
  background:transparent;color:var(--text2);font-size:13px;
  font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:.15s;
  text-align:left;display:flex;align-items:center;justify-content:space-between;gap:6px;
}
.side-tab:hover{background:var(--bg3);color:var(--text)}
.side-tab.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.side-tab .tab-badge{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  background:var(--bg);color:var(--text3);border-radius:4px;
  padding:1px 5px;min-width:20px;text-align:center;
}
.side-tab.active .tab-badge{background:var(--accent-dim);color:var(--accent)}

/* GRID AREA */
.grid-area{flex:1;overflow-y:auto;padding:20px 24px}
.section-label{
  font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(148px,1fr));
  gap:12px;
}
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:7px;
  transition:.2s;position:relative;cursor:default;
}
.card:hover{border-color:var(--border2);background:var(--bg3)}
.card.has-count{border-color:var(--border2)}
.card.has-count.bull{border-color:var(--up-border)}
.card.has-count.bear{border-color:var(--down-border)}
.card.has-count.neu{border-color:var(--neu-border)}

.badge-count{
  position:absolute;top:7px;right:7px;
  font-size:10px;font-family:'JetBrains Mono',monospace;
  border-radius:4px;padding:1px 5px;opacity:0;transition:.2s;font-weight:600;
}
.card.has-count.bull .badge-count{opacity:1;background:var(--up-dim);color:var(--up)}
.card.has-count.bear .badge-count{opacity:1;background:var(--down-dim);color:var(--down)}
.card.has-count.neu .badge-count{opacity:1;background:var(--neu-dim);color:var(--neu)}

.candle-wrap{height:72px;display:flex;align-items:center;justify-content:center}
.card-name{font-size:12px;font-weight:500;color:var(--text);text-align:center;line-height:1.4}
.card-name-en{font-size:10px;color:var(--text3);text-align:center;line-height:1.3;margin-top:-3px}
.card-signal{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500}
.sig-bull{background:var(--up-dim);color:var(--up);border:1px solid var(--up-border)}
.sig-bear{background:var(--down-dim);color:var(--down);border:1px solid var(--down-border)}
.sig-neu{background:var(--neu-dim);color:var(--neu);border:1px solid var(--neu-border)}

.counter-row{display:flex;align-items:center;gap:7px;margin-top:2px}
.cbtn{
  width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text);font-size:15px;cursor:pointer;
  transition:.15s;display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;flex-shrink:0;user-select:none;
}
.cbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.cbtn:active{transform:scale(.9)}
.count-disp{
  font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;
  min-width:32px;text-align:center;color:var(--text);
  background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1px 4px;
}

/* MODAL OVERLAY */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(5,8,14,.75);backdrop-filter:blur(2px);
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);border-radius:12px;
  padding:24px;width:420px;max-width:92vw;
  display:flex;flex-direction:column;gap:16px;
}
.modal-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.modal-title .icon{font-size:16px}
.modal-desc{font-size:12px;color:var(--text2);line-height:1.6}
.modal-field{display:flex;flex-direction:column;gap:6px}
.modal-field label{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.modal-field input{
  background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;
  padding:8px 12px;outline:none;transition:.15s;width:100%;
}
.modal-field input:focus{border-color:var(--accent)}
.modal-file-list{
  max-height:200px;overflow-y:auto;
  display:flex;flex-direction:column;gap:6px;
}
.modal-file-item{
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;cursor:pointer;transition:.15s;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.modal-file-item:hover{border-color:var(--accent);background:var(--bg4)}
.modal-file-item.selected{border-color:var(--accent);background:var(--accent-dim)}
.modal-file-name{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-file-date{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.modal-file-empty{font-size:13px;color:var(--text3);text-align:center;padding:20px 0}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.modal-btn{
  padding:8px 18px;border-radius:6px;border:1px solid var(--border2);
  font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;transition:.15s;font-weight:500;
}
.modal-btn.cancel{background:transparent;color:var(--text2)}
.modal-btn.cancel:hover{border-color:var(--text2);color:var(--text)}
.modal-btn.confirm{background:var(--save-green);color:#fff;border-color:var(--save-green)}
.modal-btn.confirm:hover{background:#047857}
.modal-btn.confirm.load-style{background:var(--accent);border-color:var(--accent)}
.modal-btn.confirm.load-style:hover{background:#2563eb}
.modal-btn.confirm:disabled{opacity:.4;cursor:not-allowed}
.modal-btn:active:not(:disabled){transform:scale(.96)}
.modal-sep{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.modal-sep::before,.modal-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* RANKING BAR */
.ranking-bar{
  flex-shrink:0;
  background:var(--bg2);border-top:1px solid var(--border);
  padding:10px 24px 14px;
}
.ranking-header{
  display:flex;align-items:center;gap:0;margin-bottom:10px;
  border-bottom:1px solid var(--border);
}
.ranking-tab{
  padding:6px 14px;font-size:11px;font-weight:500;
  font-family:'Noto Sans JP',sans-serif;
  color:var(--text3);background:transparent;border:none;
  cursor:pointer;transition:.15s;position:relative;top:1px;
  border-bottom:2px solid transparent;white-space:nowrap;
}
.ranking-tab:hover{color:var(--text2)}
.ranking-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.ranking-tab-hint{margin-left:auto;padding-bottom:4px}
.ranking-list{
  display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;
}
.ranking-item{
  flex:1;min-width:120px;max-width:160px;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:10px 10px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;
  position:relative;transition:.2s;
}
.ranking-item.rank-1{border-color:#f59e0b;background:rgba(245,158,11,.06)}
.ranking-item.rank-2{border-color:#94a3b8;background:rgba(148,163,184,.05)}
.ranking-item.rank-3{border-color:#b87333;background:rgba(184,115,51,.05)}
.rank-medal{
  position:absolute;top:6px;left:7px;
  font-size:13px;line-height:1;
}
.rank-num{
  font-size:10px;color:var(--text3);font-weight:700;font-family:'JetBrains Mono',monospace;
  letter-spacing:.05em;align-self:flex-start;margin-left:18px;
}
.ranking-candle{height:52px;display:flex;align-items:center;justify-content:center}
.ranking-name{font-size:11px;font-weight:500;color:var(--text);text-align:center;line-height:1.3}
.ranking-count{
  font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);
  background:var(--bg);border:1px solid var(--border);border-radius:5px;
  padding:1px 8px;min-width:28px;text-align:center;
}
.ranking-item.rank-1 .ranking-count{color:var(--gold)}
.ranking-item.rank-2 .ranking-count{color:#94a3b8}
.ranking-item.rank-3 .ranking-count{color:#b87333}
.ranking-bar-empty{font-size:12px;color:var(--text3);text-align:center;padding:8px 0}

/* UNDO INDICATOR */
.undo-hint{
  font-size:10px;color:var(--text3);
  display:flex;align-items:center;gap:4px;margin-left:auto;
  font-family:'JetBrains Mono',monospace;
}
.undo-hint.active{color:var(--accent)}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
  padding:10px 18px;font-size:13px;color:var(--text);
  transform:translateY(80px);opacity:0;transition:.3s;z-index:999;
  display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--up);color:var(--up)}

@media(max-width:640px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .sidebar{width:140px}
  .app-title span{display:none}
  .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}

/* iOS セーフエリア対応（ノッチ・ホームバー） */
@supports(padding: max(0px)){
  .app-header{
    padding-top:max(0px, env(safe-area-inset-top));
    padding-left:max(24px, env(safe-area-inset-left));
    padding-right:max(24px, env(safe-area-inset-right));
  }
  .stats-bar{padding-left:max(24px, env(safe-area-inset-left));padding-right:max(24px, env(safe-area-inset-right));}
  .sidebar{padding-left:max(10px, env(safe-area-inset-left));}
  .grid-area{padding-right:max(24px, env(safe-area-inset-right));}
  .ranking-bar{padding-left:max(24px, env(safe-area-inset-left));padding-right:max(24px, env(safe-area-inset-right));padding-bottom:max(14px, env(safe-area-inset-bottom));}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="app-title">
    <div class="dot"></div>
    <span>ローソク足パターン カウンター</span>
  </div>
  <div class="header-actions">
    <button class="btn-save" onclick="saveData()">💾 セーブ</button>
    <button class="btn-load" onclick="loadData()">📂 ロード</button>
    <button class="btn-reset" onclick="resetAll()">🗑 リセット</button>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat stat-total"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">合計カウント</div></div>
  <div class="stat stat-bull"><div class="stat-val" id="s-bull">0</div><div class="stat-lbl">強気パターン</div></div>
  <div class="stat stat-bear"><div class="stat-val" id="s-bear">0</div><div class="stat-lbl">弱気パターン</div></div>
  <div class="stat stat-neu"><div class="stat-val" id="s-neu">0</div><div class="stat-lbl">中立パターン</div></div>
</div>

<!-- MAIN -->
<div class="main-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="grid-area">
    <div class="section-label" id="section-label"></div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- RANKING BAR -->
<div class="ranking-bar">
  <div class="ranking-header">
    <button class="ranking-tab active" onclick="switchRankingCat('single',this)">単一線</button>
    <button class="ranking-tab" onclick="switchRankingCat('rev_bull',this)">強気反転</button>
    <button class="ranking-tab" onclick="switchRankingCat('rev_bear',this)">弱気反転</button>
    <button class="ranking-tab" onclick="switchRankingCat('continuation',this)">継続</button>
    <span class="ranking-tab-hint undo-hint" id="undo-hint">Ctrl+Z で元に戻す</span>
  </div>
  <div class="ranking-list" id="ranking-list">
    <div class="ranking-bar-empty">カウントするとランキングが表示されます</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- SAVE MODAL -->
<div class="modal-overlay" id="save-modal">
  <div class="modal">
    <div class="modal-title"><span class="icon">💾</span>セーブ</div>
    <div class="modal-desc">ファイル名を入力してセーブします。ブラウザの保存先ダイアログが開きます。</div>
    <div class="modal-field">
      <label>ファイル名</label>
      <input type="text" id="save-filename" placeholder="例: 2024-01-15_日経225" />
    </div>
    <div class="modal-desc" style="font-size:11px;color:var(--text3)">※ ブラウザの「ダウンロード」フォルダに保存されます（ブラウザの設定で変更可）</div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('save-modal')">キャンセル</button>
      <button class="modal-btn confirm" id="save-confirm-btn" onclick="executeSave()">💾 セーブ</button>
    </div>
  </div>
</div>

<!-- LOAD MODAL -->
<div class="modal-overlay" id="load-modal">
  <div class="modal">
    <div class="modal-title"><span class="icon">📂</span>ロード</div>
    <div class="modal-field">
      <label>最近のセーブデータ（ブラウザ保存）</label>
      <div class="modal-file-list" id="save-slot-list"></div>
    </div>
    <div class="modal-sep">または</div>
    <div class="modal-field">
      <label>JSONファイルから読み込む</label>
      <button class="modal-btn confirm load-style" style="width:100%;justify-content:center;display:flex" onclick="loadFromFile()">📁 ファイルを選択...</button>
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('load-modal')">キャンセル</button>
      <button class="modal-btn confirm load-style" id="load-confirm-btn" onclick="executeLoad()" disabled>📂 ロード</button>
    </div>
  </div>
</div>

<script>
// ─── 色 ───────────────────────────────────────
const UP='#ff4d6d', DOWN='#22d3ee', WICK='#6b7fa8';

// ─── SVG ヘルパー ────────────────────────────
function svgWrap(w,h,content){
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg" overflow="visible">${content}</svg>`;
}
function wick(x,y1,y2){return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="${WICK}" stroke-width="1.5" stroke-linecap="round"/>}`}
function body(x,y,w,h,col){return `<rect x="${x}" y="${y}" width="${w}" height="${Math.max(h,2)}" rx="1" fill="${col}" stroke="${col}" stroke-width=".4"/>`}
function doji_line(x,y,w,col){return `<rect x="${x}" y="${y}" width="${w}" height="2" rx="1" fill="${col}"/>`}

// single candle: wick_top, body_top, body_h, wick_bot, color
function sc(wt,bt,bh,wb,col,cx=10,bw=16){
  return wick(cx,wt,wb)+body(cx-bw/2,bt,bw,bh,col);
}
// multi-candle: offset array of {wt,bt,bh,wb,col}
function mc(candles,spacing=22){
  return candles.map((c,i)=>{
    const x=10+i*spacing;
    return wick(x,c.wt,c.wb)+body(x-7,c.bt,14,Math.max(c.bh,2),c.col);
  }).join('');
}

// ─── パターン定義 ─────────────────────────────
const CATS=[
  {id:'single',name:'単一線'},
  {id:'rev_bull',name:'強気反転'},
  {id:'rev_bear',name:'弱気反転'},
  {id:'continuation',name:'継続'},
];

const PATTERNS={
  single:[
    {name:'大陽線',           en:'Marubozu Bull',          signal:'bull', svg:()=>svgWrap(20,70,body(2,5,16,60,UP))},
    {name:'大陽線の寄付坊主',  en:'Bull Open Marubozu',     signal:'bull', svg:()=>svgWrap(20,70,wick(10,5,14)+body(2,14,16,51,UP))},
    {name:'大陽線の大引坊主',  en:'Bull Close Marubozu',    signal:'bull', svg:()=>svgWrap(20,70,wick(10,51,65)+body(2,5,16,51,UP))},

// ─── 状態 ─────────────────────────────────────
let counts={};
let currentCat='single';
let undoStack=[];   // [{name, delta}]  delta=+1 or -1
const UNDO_LIMIT=100;

function initCounts(){
  Object.keys(PATTERNS).forEach(cat=>{
    PATTERNS[cat].forEach(p=>{ if(!(p.name in counts)) counts[p.name]=0; });
  });
}

// ─── 集計 ─────────────────────────────────────
function getTotal(){ return Object.values(counts).reduce((a,b)=>a+b,0) }
function getSignalTotal(sig){
  let n=0;
  Object.keys(PATTERNS).forEach(cat=>{
    PATTERNS[cat].forEach(p=>{ if(p.signal===sig) n+=counts[p.name]||0; });
  });
  return n;
}

function updateStats(){
  document.getElementById('s-total').textContent=getTotal();
  document.getElementById('s-bull').textContent=getSignalTotal('bull');
  document.getElementById('s-bear').textContent=getSignalTotal('bear');
  document.getElementById('s-neu').textContent=getSignalTotal('neu');
}

function getCatTotal(catId){
  return (PATTERNS[catId]||[]).reduce((s,p)=>s+(counts[p.name]||0),0);
}

// ─── モーダル制御 ─────────────────────────────
const STORAGE_PREFIX='candlestick_save_';
let selectedSlotKey=null;

function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// モーダル外クリックで閉じる
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); });
});

// ─── セーブ ───────────────────────────────────
function saveData(){
  // デフォルトファイル名をセット
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const def=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
  document.getElementById('save-filename').value=def;
  openModal('save-modal');
}

function executeSave(){
  let name=(document.getElementById('save-filename').value||'').trim();
  if(!name) name=`save_${Date.now()}`;
  // .json を強制付与
  const fname=name.endsWith('.json')?name:name+'.json';
  const now=new Date().toISOString();
  const data={counts,savedAt:now,label:name};
  const json=JSON.stringify(data,null,2);

  // localStorageに最大10スロット保存（古いものを押し出す）
  try{
    const key=STORAGE_PREFIX+Date.now();
    localStorage.setItem(key,json);
    pruneSlots();
  }catch(e){}

  // ダウンロード
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=fname;
  a.click();
  URL.revokeObjectURL(a.href);

  closeModal('save-modal');
  showToast(`✓ 「${fname}」をセーブしました`,'ok');
}

function pruneSlots(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX));
  keys.sort();
  while(keys.length>10){ localStorage.removeItem(keys.shift()); }
}

// ─── ロード ───────────────────────────────────
function loadData(){
  selectedSlotKey=null;
  document.getElementById('load-confirm-btn').disabled=true;
  renderSlotList();
  openModal('load-modal');
}

function renderSlotList(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX)).sort().reverse();
  const el=document.getElementById('save-slot-list');
  if(keys.length===0){
    el.innerHTML=`<div class="modal-file-empty">ブラウザに保存されたデータがありません</div>`;
    return;
  }
  el.innerHTML=keys.map(k=>{
    let label=k,dateStr='';
    try{
      const d=JSON.parse(localStorage.getItem(k));
      label=d.label||k.replace(STORAGE_PREFIX,'');
      const dt=new Date(d.savedAt);
      dateStr=`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    }catch(e){}
    return `<div class="modal-file-item" data-key="${k}" onclick="selectSlot('${k}',this)">
      <div class="modal-file-name">${label}</div>
      <div class="modal-file-date">${dateStr}</div>
    </div>`;
  }).join('');
}

function selectSlot(key,el){
  selectedSlotKey=key;
  document.querySelectorAll('.modal-file-item').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('load-confirm-btn').disabled=false;
}

function executeLoad(){
  if(!selectedSlotKey)return;
  try{
    const data=JSON.parse(localStorage.getItem(selectedSlotKey));
    if(data&&data.counts){
      counts=data.counts;
      initCounts();
      updateStats();
      renderSidebar();
      renderGrid();
      renderRanking();
      closeModal('load-modal');
      showToast(`✓ 「${data.label||'データ'}」をロードしました`,'ok');
    }
  }catch(e){showToast('ロードに失敗しました','err')}
}

function loadFromFile(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data&&data.counts){
          counts=data.counts;
          initCounts();
          updateStats();
          renderSidebar();
          renderGrid();
          renderRanking();
          closeModal('load-modal');
          showToast(`✓ 「${file.name}」をロードしました`,'ok');
        }else{showToast('データ形式が不正です','err')}
      }catch{showToast('読み込みに失敗しました','err')}
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetAll(){
  if(!confirm('すべてのカウントをリセットしますか？\nこの操作は元に戻せません。'))return;
  Object.keys(counts).forEach(k=>counts[k]=0);
  undoStack=[];
  updateStats();
  renderSidebar();
  renderGrid();
  renderRanking();
  updateUndoHint();
  showToast('リセットしました','ok');
}

// ─── トースト ──────────────────────────────────
let toastTimer=null;
function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show '+(type||'');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// ─── レンダリング ──────────────────────────────
function renderSidebar(){
  const el=document.getElementById('sidebar');
  el.innerHTML=CATS.map(c=>{
    const tot=getCatTotal(c.id);
    return `<button class="side-tab${c.id===currentCat?' active':''}" onclick="switchCat('${c.id}')">
      <span>${c.name}</span>
      <span class="tab-badge">${tot||''}</span>
    </button>`;
  }).join('');
}

function renderGrid(){
  const el=document.getElementById('grid');
  const lbl=document.getElementById('section-label');
  const cat=CATS.find(c=>c.id===currentCat);
  lbl.textContent=cat?cat.name:'';
  const patterns=PATTERNS[currentCat]||[];
  el.innerHTML=patterns.map(p=>{
    const cnt=counts[p.name]||0;
    const sigClass=`sig-${p.signal}`;
    const sigLabel=p.signal==='bull'?'強気':p.signal==='bear'?'弱気':'中立';
    const hasCount=cnt>0;
    return `<div class="card${hasCount?` has-count ${p.signal}`:''}" id="card-${CSS.escape(p.name)}">
      <div class="badge-count" id="badge-${CSS.escape(p.name)}">${cnt}</div>
      <div class="candle-wrap">${p.svg()}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-name-en">${p.en}</div>
      <span class="card-signal ${sigClass}">${sigLabel}</span>
      <div class="counter-row">
        <button class="cbtn" onclick="dec('${p.name}')">−</button>
        <div class="count-disp" id="cnt-${CSS.escape(p.name)}">${cnt}</div>
        <button class="cbtn" onclick="inc('${p.name}')">＋</button>
      </div>
    </div>`;
  }).join('');
}

function switchCat(id){ currentCat=id; renderSidebar(); renderGrid(); }

function pushUndo(name,delta){
  undoStack.push({name,delta});
  if(undoStack.length>UNDO_LIMIT) undoStack.shift();
  updateUndoHint();
}
function updateUndoHint(){
  const el=document.getElementById('undo-hint');
  if(!el)return;
  if(undoStack.length>0){
    el.classList.add('active');
    el.textContent=`Ctrl+Z で元に戻す (${undoStack.length})`;
  } else {
    el.classList.remove('active');
    el.textContent='Ctrl+Z で元に戻す';
  }
}
function undoAction(){
  if(undoStack.length===0){showToast('元に戻す操作はありません','err');return;}
  const {name,delta}=undoStack.pop();
  // delta を逆向きに適用
  counts[name]=Math.max(0,(counts[name]||0)-delta);
  updateCard(name); updateStats(); renderSidebar(); renderRanking();
  updateUndoHint();
  showToast(`↩ 「${name}」の操作を元に戻しました`,'ok');
}

function inc(name){
  counts[name]=(counts[name]||0)+1;
  pushUndo(name,+1);
  updateCard(name); updateStats(); renderSidebar(); renderRanking();
}
function dec(name){
  if((counts[name]||0)===0)return;
  counts[name]--;
  pushUndo(name,-1);
  updateCard(name); updateStats(); renderSidebar(); renderRanking();
}
function updateCard(name){
  const cnt=counts[name]||0;
  const key=CSS.escape(name);
  const cntEl=document.getElementById('cnt-'+key);
  const badgeEl=document.getElementById('badge-'+key);
  const cardEl=document.getElementById('card-'+key);
  if(cntEl) cntEl.textContent=cnt;
  if(badgeEl) badgeEl.textContent=cnt;
  if(cardEl){
    const p=Object.values(PATTERNS).flat().find(p=>p.name===name);
    if(cnt>0){
      cardEl.className=`card has-count ${p?p.signal:''}`;
    } else {
      cardEl.className='card';
    }
  }
}

// ─── ランキング描画 ────────────────────────────
const MEDALS=['🥇','🥈','🥉','4','5'];
const RANK_CLASSES=['rank-1','rank-2','rank-3','',''];
let currentRankingCat='single';

function switchRankingCat(catId, btnEl){
  currentRankingCat=catId;
  document.querySelectorAll('.ranking-tab').forEach(b=>b.classList.remove('active'));
  if(btnEl) btnEl.classList.add('active');
  renderRanking();
}

function renderRanking(){
  const el=document.getElementById('ranking-list');
  if(!el)return;
  const patterns=PATTERNS[currentRankingCat]||[];
  const ranked=patterns
    .map(p=>({...p,count:counts[p.name]||0}))
    .filter(p=>p.count>0)
    .sort((a,b)=>b.count-a.count)
    .slice(0,5);

  if(ranked.length===0){
    el.innerHTML=`<div class="ranking-bar-empty">カウントするとランキングが表示されます</div>`;
    return;
  }

  let displayRank=1;
  el.innerHTML=ranked.map((p,i)=>{
    if(i>0 && ranked[i].count<ranked[i-1].count) displayRank=i+1;
    const rankClass=RANK_CLASSES[displayRank-1]||'';
    const medal=displayRank<=3?MEDALS[displayRank-1]:'';
    const numLabel=displayRank>3?`${displayRank}位`:'';
    const svgSmall=p.svg().replace(/width="(\d+)"/,(_,w)=>`width="${Math.round(w*0.75)}"`)
                          .replace(/height="(\d+)"/,(_,h)=>`height="${Math.round(h*0.75)}"`);
    return `<div class="ranking-item ${rankClass}">
      ${medal?`<div class="rank-medal">${medal}</div>`:''}
      <div class="rank-num">${numLabel||'&nbsp;'}</div>
      <div class="ranking-candle">${svgSmall}</div>
      <div class="ranking-name">${p.name}</div>
      <div class="ranking-count">${p.count}</div>
    </div>`;
  }).join('');
}

// ─── 起動 ─────────────────────────────────────
initCounts();
renderSidebar();
renderGrid();
updateStats();
renderRanking();
updateUndoHint();

// Enterキーでセーブ確定
document.getElementById('save-filename').addEventListener('keydown',e=>{
  if(e.key==='Enter') executeSave();
});

// Ctrl+Z でアンドゥ
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey) && e.key==='z'){
    // テキスト入力中は無視
    const tag=(document.activeElement||{}).tagName;
    if(tag==='INPUT'||tag==='TEXTAREA') return;
    e.preventDefault();
    undoAction();
  }
});

// Service Worker 登録（PWA）
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW登録完了:', reg.scope))
      .catch(err => console.warn('SW登録失敗:', err));
  });
}
